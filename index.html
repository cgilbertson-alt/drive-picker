<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Choose from Drive</title>
<style>
  body { margin: 0; background: #fff; }
</style>
</head>
<body>
<script>
var oauthToken = '', developerKey = '', appId = '', openerOrigin = '';

function init() {
  var params = new URLSearchParams(window.location.search);
  var encoded = params.get('ctx');
  if (!encoded) { window.close(); return; }

  try {
    var ctx = JSON.parse(atob(encoded));
    oauthToken   = ctx.oauthToken;
    developerKey = ctx.developerKey;
    appId        = ctx.appId;
    openerOrigin = ctx.openerOrigin;
  } catch(e) {
    window.close();
    return;
  }

  var s = document.createElement('script');
  s.src = 'https://apis.google.com/js/api.js';
  s.onload = function() {
    gapi.load('picker', function() { showPicker(); });
  };
  document.body.appendChild(s);
}

function showPicker() {
  var view = new google.picker.DocsView(google.picker.ViewId.DOCS)
    .setIncludeFolders(true)
    .setSelectFolderEnabled(true)
    .setMode(google.picker.DocsViewMode.LIST);

  var builder = new google.picker.PickerBuilder()
    .setDeveloperKey(developerKey)
    .setOAuthToken(oauthToken)
    .setCallback(pickerCallback)
    .setOrigin(window.location.origin)
    .setTitle('Select a Google Drive file or folder')
    .setMaxItems(1);

  if (appId) builder.setAppId(appId);
  builder.addView(view);
  builder.build().setVisible(true);
}

function pickerCallback(data) {
  var action = data[google.picker.Response.ACTION];
  if (action === google.picker.Action.PICKED) {
    var doc = data[google.picker.Response.DOCUMENTS][0];
    window.opener.postMessage({ type: 'PICKER_PICKED', doc: doc }, openerOrigin);
    window.close();
  } else if (action === google.picker.Action.CANCEL) {
    window.opener.postMessage({ type: 'PICKER_CANCEL' }, openerOrigin);
    window.close();
  }
}

init();
</script>
</body>
</html>
