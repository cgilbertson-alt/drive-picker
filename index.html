<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Choose from Drive</title>
<style>
  body { margin: 0; background: #fff; }
</style>
</head>
<body>
<script>
var oauthToken = '', developerKey = '', appId = '', openerOrigin = '';

function init() {
  var params = new URLSearchParams(window.location.search);
  var encoded = params.get('ctx');
  if (!encoded) { window.close(); return; }

  try {
    var ctx = JSON.parse(atob(encoded));
    oauthToken   = ctx.oauthToken;
    developerKey = ctx.developerKey;
    appId        = ctx.appId;
    openerOrigin = ctx.openerOrigin;
  } catch(e) {
    window.close();
    return;
  }

  var s = document.createElement('script');
  s.src = 'https://apis.google.com/js/api.js';
  s.onload = function() {
    gapi.load('picker', function() { showPicker(); });
  };
  document.body.appendChild(s);
}

function showPicker() {
  // Tab 1: Recent files and folders
  var recentView = new google.picker.DocsView(google.picker.ViewId.RECENTLY_PICKED)
    .setIncludeFolders(true)
    .setSelectFolderEnabled(true)
    .setMode(google.picker.DocsViewMode.LIST)
    .setLabel('Recent');

  // Tab 2: Shared Drives (Team Drives)
  var sharedDrivesView = new google.picker.DocsView(google.picker.ViewId.DOCS)
    .setIncludeFolders(true)
    .setSelectFolderEnabled(true)
    .setEnableTeamDrives(true)
    .setMode(google.picker.DocsViewMode.LIST)
    .setLabel('Shared Drives');

  // Tab 3: Starred files and folders
  var starredView = new google.picker.DocsView(google.picker.ViewId.DOCS)
    .setIncludeFolders(true)
    .setSelectFolderEnabled(true)
    .setMode(google.picker.DocsViewMode.LIST)
    .setQuery('is:starred')
    .setLabel('Starred');

  // Tab 4: Full My Drive browser as a fallback
  var myDriveView = new google.picker.DocsView(google.picker.ViewId.DOCS)
    .setIncludeFolders(true)
    .setSelectFolderEnabled(true)
    .setMode(google.picker.DocsViewMode.LIST)
    .setLabel('My Drive');

  var builder = new google.picker.PickerBuilder()
    .setDeveloperKey(developerKey)
    .setOAuthToken(oauthToken)
    .setCallback(pickerCallback)
    .setOrigin(window.location.origin)
    .setTitle('Select a file or folder')
    .setMaxItems(1)
    .addView(recentView)
    .addView(sharedDrivesView)
    .addView(starredView)
    .addView(myDriveView);

  if (appId) builder.setAppId(appId);
  builder.build().setVisible(true);
}

function pickerCallback(data) {
  var action = data[google.picker.Response.ACTION];
  if (action === google.picker.Action.PICKED) {
    var doc = data[google.picker.Response.DOCUMENTS][0];
    // Use '*' as target origin — the page may be embedded in a Google Site iframe,
    // so the opener's effective origin can differ from the Apps Script URL.
    window.opener.postMessage({ type: 'PICKER_PICKED', doc: doc }, '*');
    window.close();
  } else if (action === google.picker.Action.CANCEL) {
    window.opener.postMessage({ type: 'PICKER_CANCEL' }, '*');
    window.close();
  }
}

init();
</script>
</body>
</html>
